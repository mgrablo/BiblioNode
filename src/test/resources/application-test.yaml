app:
  initial-admin:
    email: ${BD_INITIAL_ADMIN_EMAIL:root@biblionode.com}
    password: ${BD_INITIAL_ADMIN_PASSWORD:root1234}
  rsa:
    public-key: ${RSA_PUBLIC_KEY:file:./certs/public_key.pem}
    private-key: ${RSA_PRIVATE_KEY:file:./certs/private_key.pem}
  loan:
    max-active-loans: 2
    default-loan-days: 14

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.xml