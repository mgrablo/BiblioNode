@if (isLoading()) {
  <div class="flex h-full w-full items-center justify-center">
    <span class="material-symbols-outlined animate-spin">progress_activity</span>
  </div>
} @else if (errorMessage()) {
  <div class="mx-auto max-w-240 px-5 py-10 lg:py-14">
    <app-backlink route="/browse" class="mb-8 block">Back to catalog</app-backlink>
    <div
      class="relative mb-6 flex flex-row items-center rounded border border-red-400 bg-red-100 px-4 py-3 text-red-700"
      role="alert"
    >
      <p class="text-sm text-red-500">{{ errorMessage() }}</p>
    </div>
  </div>
} @else if (book(); as bookData) {
  <app-details [book]="bookData" />
}
