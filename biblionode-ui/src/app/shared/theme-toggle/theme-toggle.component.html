<button class="btn rounded-lg p-2 text-gray-800 hover:text-gray-950 dark:text-gray-200  hover:dark:text-gray-50 transition-colors"
        aria-label="Toggle theme"
        (click)="toggleTheme()">
  <span class="material-symbols-outlined hover:rotate-45 hover:scale-105 transition-all duration-300 inline-block">
    @if (isDark()) {
      dark_mode
    } @else {
      light_mode
    }
  </span>
</button>
