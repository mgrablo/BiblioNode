services:
  db:
    image: postgres:18.1-alpine3.23
    container_name: biblionode-db
    environment:
      POSTGRES_DB: biblionode-db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d biblionode-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: biblionode-app
    ports:
      - "8080:8080"
    volumes:
      - ./certs:/app/certs
    depends_on:
      db:
        condition: service_healthy
    environment:
      BD_INITIAL_ADMIN_EMAIL: ${BD_INITIAL_ADMIN_EMAIL:-}
      BD_INITIAL_ADMIN_PASSWORD: ${BD_INITIAL_ADMIN_PASSWORD:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/biblionode-db
      SPRING_DATASOURCE_USERNAME: dev_user
      SPRING_DATASOURCE_PASSWORD: dev_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      RSA_PUBLIC_KEY: file:/app/certs/public_key.pem
      RSA_PRIVATE_KEY: file:/app/certs/private_key.pem

volumes:
  postgres_data: